<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mustang Watch</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <main class="page">
    <header class="detail-header">
      <p class="eyebrow">Watch Details</p>
      <h1>Mustang</h1>
      <p class="detail-subtitle">Framework page for your Mustang watch launch. Replace image placeholders as needed.</p>
    </header>

    <section class="content-stack">
      <article class="watch-card">
        <h2 class="watch-name">Hero Artwork</h2>
        <div class="watch-media">
          <img src="../images/mustang/mustang-hero.jpg" alt="Mustang watch hero artwork placeholder" />
        </div>
      </article>

      <article class="watch-card">
        <h2 class="watch-name">Image Gallery (standard naming)</h2>
        <div class="media-grid">
          <img src="../images/mustang/mustang-feature-panel.jpg" alt="Mustang feature panel placeholder" />
          <img src="../images/mustang/mustang-on-wrist.jpg" alt="Mustang watch on wrist placeholder" />
          <img src="../images/mustang/mustang-ui-breakdown.jpg" alt="Mustang UI breakdown placeholder" />
          <img src="../images/mustang/mustang-face-round.png" alt="Mustang round face render placeholder" />
          <img src="../images/mustang/mustang-aod.png" alt="Mustang always-on display placeholder" />
        </div>
      </article>

      <div class="link-row">
        <a class="cta-button" href="#" aria-disabled="true">Play Store: Coming soon</a>
        <a class="cta-button" href="../index.html">Back to all watches</a>
      </div>
    </section>
  </main>
</body>
</html>
