<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drifting Cars Clockface Prototype</title>
  <style>
    :root {
      --size: min(88vmin, 560px);
      --ring-color: #2e2e2e;
      --tick-color: #6e6e6e;
      --text-color: #d7d7d7;
      --bg: radial-gradient(circle at 40% 30%, #1f1f1f, #0f0f0f 70%);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: var(--text-color);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .layout {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(16px, 3vw, 42px);
      padding: 20px;
    }

    .controls {
      width: min(320px, 32vw);
      min-width: 220px;
      background: #0d0d0d;
      border: 1px solid #303030;
      border-radius: 14px;
      padding: 16px;
    }

    .controls h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .controls p {
      margin: 0 0 14px;
      opacity: 0.85;
      font-size: 14px;
      line-height: 1.4;
    }

    .control {
      margin-top: 12px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px;
      opacity: 0.95;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .watch {
      position: relative;
      width: var(--size);
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--ring-color);
      box-shadow: 0 0 0 8px #111, 0 16px 42px rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% calc(var(--size) * -0.42);
      width: 2px;
      height: 12px;
      background: var(--tick-color);
      opacity: 0.5;
    }

    .tick.hour {
      height: 20px;
      width: 3px;
      opacity: 0.9;
      background: #b3b3b3;
    }

    #digitalTime {
      position: absolute;
      left: 50%;
      top: 12%;
      transform: translateX(-50%);
      min-width: 170px;
      text-align: center;
      font-size: clamp(32px, 6.2vmin, 44px);
      letter-spacing: 2px;
      font-weight: 700;
      color: #f4f4f4;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
      pointer-events: none;
    }

    #car {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28%;
      max-width: 190px;
      pointer-events: none;
      transform-origin: 50% 50%;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.8));
      will-change: transform;
    }

    .hub {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      box-shadow: 0 0 0 3px #1a1a1a;
    }
  </style>
</head>
<body>
  <main class="layout">
    <aside class="controls">
      <h2>Prototype Controls</h2>
      <p>All tuning UI is outside the watch face so you can preview clean placement.</p>

      <div class="control">
        <label for="carSizeSlider">Car Size <span id="carSizeValue">28%</span></label>
        <input id="carSizeSlider" type="range" min="16" max="40" value="28" />
      </div>

      <div class="control">
        <label for="carRadiusSlider">Car Distance From Center <span id="carRadiusValue">0.39×</span></label>
        <input id="carRadiusSlider" type="range" min="0.30" max="0.46" step="0.01" value="0.39" />
      </div>

      <p style="margin-top:14px;">Car follows seconds clockwise and stays tangent to the circle.</p>
    </aside>

    <div class="watch" id="watch">
      <div id="digitalTime">00:00</div>
    </div>
  </main>

  <script>
    const watch = document.getElementById('watch');
    const digitalTime = document.getElementById('digitalTime');

    const carSizeSlider = document.getElementById('carSizeSlider');
    const carRadiusSlider = document.getElementById('carRadiusSlider');
    const carSizeValue = document.getElementById('carSizeValue');
    const carRadiusValue = document.getElementById('carRadiusValue');

    for (let i = 0; i < 60; i++) {
      const tick = document.createElement('div');
      tick.className = i % 5 === 0 ? 'tick hour' : 'tick';
      tick.style.transform = `translate(-50%, -50%) rotate(${i * 6}deg) translateY(calc(var(--size) * -0.44))`;
      watch.appendChild(tick);
    }

    const car = document.createElement('img');
    car.id = 'car';
    car.alt = 'Car second hand';

    const cars = [
      'car_images/Nissan Skyline R34 - Matte White.png',
      'car_images/Porshe 911 - Glossy red.png',
      'car_images/Subaru WRX STI - Metallic blue.png',
    ];

    const secondNow = new Date().getSeconds();
    car.src = cars[secondNow % cars.length];
    watch.appendChild(car);

    const hub = document.createElement('div');
    hub.className = 'hub';
    watch.appendChild(hub);

    function updateSliderLabels() {
      car.style.width = `${carSizeSlider.value}%`;
      carSizeValue.textContent = `${carSizeSlider.value}%`;
      carRadiusValue.textContent = `${Number(carRadiusSlider.value).toFixed(2)}×`;
    }

    function updateDigitalTime(now) {
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      digitalTime.textContent = `${h}:${m}`;
    }

    function updateCar() {
      const now = new Date();
      const seconds = now.getSeconds() + now.getMilliseconds() / 1000;
      const secAngle = seconds * 6;
      const theta = secAngle * Math.PI / 180;

      const radiusScale = Number(carRadiusSlider.value);
      const radius = watch.clientWidth * radiusScale;

      const x = radius * Math.sin(theta);
      const y = -radius * Math.cos(theta);
      const rotation = secAngle;

      car.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) rotate(${rotation}deg)`;

      const secInt = Math.floor(seconds) % 60;
      car.src = cars[secInt % cars.length];

      updateDigitalTime(now);
      requestAnimationFrame(updateCar);
    }

    carSizeSlider.addEventListener('input', updateSliderLabels);
    carRadiusSlider.addEventListener('input', updateSliderLabels);

    updateSliderLabels();
    updateCar();
  </script>
</body>
</html>
