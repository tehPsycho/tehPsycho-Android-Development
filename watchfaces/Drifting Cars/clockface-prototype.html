<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drifting Cars Clockface Prototype</title>
  <style>
    :root {
      --size: min(88vmin, 560px);
      --ring-color: #2e2e2e;
      --tick-color: #6e6e6e;
      --text-color: #d7d7d7;
      --bg: radial-gradient(circle at 40% 30%, #1f1f1f, #0f0f0f 70%);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: var(--text-color);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .layout {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(16px, 3vw, 42px);
      padding: 20px;
    }

    .controls {
      width: min(340px, 34vw);
      max-height: 90vh;
      overflow: auto;
      min-width: 220px;
      background: #0d0d0d;
      border: 1px solid #303030;
      border-radius: 14px;
      padding: 16px;
    }

    .controls h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .controls p {
      margin: 0 0 14px;
      opacity: 0.85;
      font-size: 14px;
      line-height: 1.4;
    }

    .control {
      margin-top: 12px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px;
      opacity: 0.95;
    }

    .control input[type="range"],
    .control input[type="number"],
    .control input[type="color"] {
      width: 100%;
    }

    .bound-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .bound-inputs label {
      display: block;
      margin: 0;
    }

    .bound-inputs span {
      display: block;
      font-size: 11px;
      margin-bottom: 4px;
      opacity: 0.85;
    }

    .bound-inputs input {
      background: #171717;
      border: 1px solid #323232;
      border-radius: 6px;
      color: #ddd;
      padding: 6px;
    }

    .readout {
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.88;
      text-align: right;
    }

    .watch {
      position: relative;
      width: var(--size);
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--ring-color);
      box-shadow: 0 0 0 8px #111, 0 16px 42px rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% calc(var(--size) * -0.42);
      width: 2px;
      height: 12px;
      background: var(--tick-color);
      opacity: 0.5;
    }

    .tick.hour {
      height: 20px;
      width: 3px;
      opacity: 0.9;
      background: #b3b3b3;
    }

    #digitalTime {
      position: absolute;
      left: 50%;
      top: 12%;
      transform: translate(-50%, -50%);
      min-width: 170px;
      text-align: center;
      font-size: 40px;
      letter-spacing: 2px;
      font-weight: 700;
      color: #f4f4f4;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
      pointer-events: none;
    }

    #car {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28%;
      max-width: 190px;
      pointer-events: none;
      transform-origin: 50% 50%;
      filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.8));
      will-change: transform;
    }

    .hub {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      box-shadow: 0 0 0 3px #1a1a1a;
    }
  </style>
</head>
<body>
  <main class="layout">
    <aside class="controls">
      <h2>Prototype Controls</h2>
      <p>All tuning UI is outside the watch face so you can preview clean placement.</p>

      <h3>Time Text</h3>
      <div class="control">
        <label for="timeSizeSlider">Time Size <span id="timeSizeValue">40px</span></label>
        <input id="timeSizeSlider" type="range" min="24" max="70" value="40" />
      </div>
      <div class="control">
        <label for="timeXSlider">Time X Position <span id="timeXValue">50%</span></label>
        <input id="timeXSlider" type="range" min="10" max="90" value="50" />
      </div>
      <div class="control">
        <label for="timeYSlider">Time Y Position <span id="timeYValue">12%</span></label>
        <input id="timeYSlider" type="range" min="5" max="50" value="12" />
      </div>
      <div class="control">
        <label for="timeColorInput">Time Color <span id="timeColorValue">#f4f4f4</span></label>
        <input id="timeColorInput" type="color" value="#f4f4f4" />
      </div>

      <h3>Car Motion</h3>
      <div class="control">
        <label for="carSizeSlider">Car Size Slider Position</label>
        <input id="carSizeSlider" type="range" min="16" max="40" step="0.5" value="28" />
        <div class="readout" id="carSizeReadout">Current: 28.0%</div>
        <div class="bound-inputs">
          <label><span>Size Min %</span><input id="carSizeMinInput" type="number" step="0.5" value="16" /></label>
          <label><span>Size Max %</span><input id="carSizeMaxInput" type="number" step="0.5" value="40" /></label>
        </div>
      </div>

      <div class="control">
        <label for="carRadiusSlider">Car Radius Slider Position</label>
        <input id="carRadiusSlider" type="range" min="0.30" max="0.46" step="0.005" value="0.39" />
        <div class="readout" id="carRadiusReadout">Current: 0.390×</div>
        <div class="bound-inputs">
          <label><span>Radius Min ×</span><input id="carRadiusMinInput" type="number" step="0.01" value="0.30" /></label>
          <label><span>Radius Max ×</span><input id="carRadiusMaxInput" type="number" step="0.01" value="0.46" /></label>
        </div>
      </div>

      <div class="control">
        <label for="carRotationSlider">Car Rotation Offset <span id="carRotationValue">0°</span></label>
        <input id="carRotationSlider" type="range" min="-180" max="180" value="0" />
      </div>

      <div class="control">
        <label for="rotationMultiplierSlider">Orbit Speed Multiplier <span id="rotationMultiplierValue">1.00×</span></label>
        <input id="rotationMultiplierSlider" type="range" min="0" max="4" step="0.05" value="1" />
      </div>

      <p style="margin-top:14px;">Car follows seconds clockwise, stays tangent to the circle, and can be sped up with multiplier.</p>
    </aside>

    <div class="watch" id="watch">
      <div id="digitalTime">00:00</div>
    </div>
  </main>

  <script>
    const watch = document.getElementById('watch');
    const digitalTime = document.getElementById('digitalTime');

    const timeSizeSlider = document.getElementById('timeSizeSlider');
    const timeXSlider = document.getElementById('timeXSlider');
    const timeYSlider = document.getElementById('timeYSlider');
    const timeColorInput = document.getElementById('timeColorInput');
    const timeSizeValue = document.getElementById('timeSizeValue');
    const timeXValue = document.getElementById('timeXValue');
    const timeYValue = document.getElementById('timeYValue');
    const timeColorValue = document.getElementById('timeColorValue');

    const carSizeSlider = document.getElementById('carSizeSlider');
    const carRadiusSlider = document.getElementById('carRadiusSlider');
    const carSizeMinInput = document.getElementById('carSizeMinInput');
    const carSizeMaxInput = document.getElementById('carSizeMaxInput');
    const carRadiusMinInput = document.getElementById('carRadiusMinInput');
    const carRadiusMaxInput = document.getElementById('carRadiusMaxInput');
    const carSizeReadout = document.getElementById('carSizeReadout');
    const carRadiusReadout = document.getElementById('carRadiusReadout');
    const carRotationSlider = document.getElementById('carRotationSlider');
    const carRotationValue = document.getElementById('carRotationValue');
    const rotationMultiplierSlider = document.getElementById('rotationMultiplierSlider');
    const rotationMultiplierValue = document.getElementById('rotationMultiplierValue');

    for (let i = 0; i < 60; i++) {
      const tick = document.createElement('div');
      tick.className = i % 5 === 0 ? 'tick hour' : 'tick';
      tick.style.transform = `translate(-50%, -50%) rotate(${i * 6}deg) translateY(calc(var(--size) * -0.44))`;
      watch.appendChild(tick);
    }

    const car = document.createElement('img');
    car.id = 'car';
    car.alt = 'Car second hand';

    const cars = [
      'car_images/Nissan Skyline R34 - Matte White.png',
      'car_images/Porshe 911 - Glossy red.png',
      'car_images/Subaru WRX STI - Metallic blue.png',
    ];

    const secondNow = new Date().getSeconds();
    car.src = cars[secondNow % cars.length];
    watch.appendChild(car);

    const hub = document.createElement('div');
    hub.className = 'hub';
    watch.appendChild(hub);

    function syncSliderBounds(slider, minInput, maxInput, fallbackSpan = 0.1) {
      let min = Number(minInput.value);
      let max = Number(maxInput.value);

      if (!Number.isFinite(min)) min = Number(slider.min);
      if (!Number.isFinite(max)) max = Number(slider.max);
      if (max <= min) {
        max = min + fallbackSpan;
        maxInput.value = String(max);
      }

      slider.min = String(min);
      slider.max = String(max);

      let value = Number(slider.value);
      value = Math.min(max, Math.max(min, value));
      slider.value = String(value);
    }

    function updateControlLabels() {
      digitalTime.style.fontSize = `${timeSizeSlider.value}px`;
      digitalTime.style.left = `${timeXSlider.value}%`;
      digitalTime.style.top = `${timeYSlider.value}%`;
      digitalTime.style.color = timeColorInput.value;

      timeSizeValue.textContent = `${timeSizeSlider.value}px`;
      timeXValue.textContent = `${timeXSlider.value}%`;
      timeYValue.textContent = `${timeYSlider.value}%`;
      timeColorValue.textContent = timeColorInput.value;

      car.style.width = `${carSizeSlider.value}%`;
      carSizeReadout.textContent = `Current: ${Number(carSizeSlider.value).toFixed(1)}%`;
      carRadiusReadout.textContent = `Current: ${Number(carRadiusSlider.value).toFixed(3)}×`;

      carRotationValue.textContent = `${Number(carRotationSlider.value).toFixed(0)}°`;
      rotationMultiplierValue.textContent = `${Number(rotationMultiplierSlider.value).toFixed(2)}×`;
    }

    function updateDigitalTime(now) {
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      digitalTime.textContent = `${h}:${m}`;
    }

    function updateCar() {
      const now = new Date();
      const seconds = now.getSeconds() + now.getMilliseconds() / 1000;
      const multiplier = Number(rotationMultiplierSlider.value);
      const secAngle = seconds * 6 * multiplier;
      const theta = secAngle * Math.PI / 180;

      const radiusScale = Number(carRadiusSlider.value);
      const radius = watch.clientWidth * radiusScale;

      const x = radius * Math.sin(theta);
      const y = -radius * Math.cos(theta);
      const rotationOffset = Number(carRotationSlider.value);
      const rotation = secAngle + rotationOffset;

      car.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) rotate(${rotation}deg)`;

      const secInt = Math.floor(seconds) % 60;
      car.src = cars[secInt % cars.length];

      updateDigitalTime(now);
      requestAnimationFrame(updateCar);
    }

    const controlInputs = [
      timeSizeSlider, timeXSlider, timeYSlider, timeColorInput,
      carSizeSlider, carRadiusSlider, carRotationSlider, rotationMultiplierSlider
    ];
    controlInputs.forEach((input) => input.addEventListener('input', updateControlLabels));

    const bounds = [
      [carSizeSlider, carSizeMinInput, carSizeMaxInput, 1],
      [carRadiusSlider, carRadiusMinInput, carRadiusMaxInput, 0.01],
    ];

    bounds.forEach(([slider, minInput, maxInput, fallback]) => {
      const sync = () => {
        syncSliderBounds(slider, minInput, maxInput, fallback);
        updateControlLabels();
      };
      minInput.addEventListener('input', sync);
      maxInput.addEventListener('input', sync);
      sync();
    });

    updateControlLabels();
    updateCar();
  </script>
</body>
</html>
