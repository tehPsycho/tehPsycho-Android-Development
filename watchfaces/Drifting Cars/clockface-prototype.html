<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drifting Cars Clockface Prototype</title>
  <style>
    :root {
      --size: min(88vmin, 560px);
      --ring-color: #2e2e2e;
      --text-color: #d7d7d7;
      --bg: radial-gradient(circle at 40% 30%, #1f1f1f, #0f0f0f 70%);
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #000; color: var(--text-color); font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .layout { min-height: 100vh; display: flex; justify-content: center; align-items: center; gap: clamp(16px, 3vw, 42px); padding: 20px; }
    .controls { width: min(340px, 34vw); max-height: 90vh; overflow: auto; min-width: 220px; background: #0d0d0d; border: 1px solid #303030; border-radius: 14px; padding: 16px; }
    .controls h2 { margin: 0 0 8px; font-size: 18px; }
    .controls p { margin: 0 0 14px; opacity: 0.85; font-size: 14px; line-height: 1.4; }
    .control { margin-top: 12px; }
    .control label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; opacity: 0.95; }
    .control input[type="number"], .control input[type="color"] { width: 100%; }

    .stepper { display: grid; grid-template-columns: 34px 1fr 34px; gap: 8px; align-items: center; }
    .step-btn, .stepper input { background: #171717; border: 1px solid #323232; color: #ddd; border-radius: 6px; height: 34px; }
    .step-btn { cursor: pointer; font-size: 18px; line-height: 1; }
    .stepper input { text-align: center; padding: 6px; }

    .watch { position: relative; width: var(--size); aspect-ratio: 1; border-radius: 50%; background: var(--bg); border: 2px solid var(--ring-color); box-shadow: 0 0 0 8px #111, 0 16px 42px rgba(0, 0, 0, 0.55); overflow: hidden; }
    #digitalTime { position: absolute; left: 50%; top: 12%; transform: translate(-50%, -50%); min-width: 170px; text-align: center; font-size: 40px; letter-spacing: 2px; font-weight: 700; color: #f4f4f4; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7); pointer-events: none; z-index: 0; }
    #smokeLayer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .smoke-puff { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, rgba(240,240,240,0.58), rgba(110,110,110,0.22) 68%, rgba(80,80,80,0) 100%); filter: blur(1px); transform: translate(-50%, -50%); will-change: transform, opacity; }
    #car { position: absolute; left: 50%; top: 50%; width: 28%; max-width: 190px; pointer-events: none; transform-origin: 50% 50%; filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.8)); will-change: transform; z-index: 2; }
    .hub { position: absolute; left: 50%; top: 50%; width: 8px; height: 8px; border-radius: 50%; transform: translate(-50%, -50%); background: #fff; box-shadow: 0 0 0 3px #1a1a1a; z-index: 2; }
  </style>
</head>
<body>
  <main class="layout">
    <aside class="controls">
      <h2>Prototype Controls</h2>
      <p>All tuning UI is outside the watch face so you can preview clean placement.</p>
      <h3>Time Text</h3>
      <div class="control"><label for="timeSizeInput">Time Size (px)</label><div class="stepper"><button class="step-btn" data-target="timeSizeInput" data-step="-1">−</button><input id="timeSizeInput" type="number" value="40" step="1" /><button class="step-btn" data-target="timeSizeInput" data-step="1">+</button></div></div>
      <div class="control"><label for="timeXInput">Time X Position (%)</label><div class="stepper"><button class="step-btn" data-target="timeXInput" data-step="-1">−</button><input id="timeXInput" type="number" value="50" step="1" /><button class="step-btn" data-target="timeXInput" data-step="1">+</button></div></div>
      <div class="control"><label for="timeYInput">Time Y Position (%)</label><div class="stepper"><button class="step-btn" data-target="timeYInput" data-step="-1">−</button><input id="timeYInput" type="number" value="12" step="1" /><button class="step-btn" data-target="timeYInput" data-step="1">+</button></div></div>
      <div class="control"><label for="timeColorInput">Time Color</label><input id="timeColorInput" type="color" value="#f4f4f4" /></div>
      <h3>Car Motion</h3>
      <div class="control"><label for="carSizeInput">Car Size (%)</label><div class="stepper"><button class="step-btn" data-target="carSizeInput" data-step="-0.5">−</button><input id="carSizeInput" type="number" value="28" step="0.5" /><button class="step-btn" data-target="carSizeInput" data-step="0.5">+</button></div></div>
      <div class="control"><label for="carRadiusInput">Car Radius (× watch width)</label><div class="stepper"><button class="step-btn" data-target="carRadiusInput" data-step="-0.01">−</button><input id="carRadiusInput" type="number" value="0.39" step="0.01" /><button class="step-btn" data-target="carRadiusInput" data-step="0.01">+</button></div></div>
      <div class="control"><label for="carRotationInput">Car Rotation Offset (°)</label><div class="stepper"><button class="step-btn" data-target="carRotationInput" data-step="-1">−</button><input id="carRotationInput" type="number" value="0" step="1" /><button class="step-btn" data-target="carRotationInput" data-step="1">+</button></div></div>
      <div class="control"><label for="rotationMultiplierInput">Orbit Speed Multiplier (×)</label><div class="stepper"><button class="step-btn" data-target="rotationMultiplierInput" data-step="-0.05">−</button><input id="rotationMultiplierInput" type="number" value="1" step="0.05" /><button class="step-btn" data-target="rotationMultiplierInput" data-step="0.05">+</button></div></div>
      <h3>Smoke Trail</h3>
      <div class="control"><label for="smokeRotationInput">Smoke Rotation Offset Left Tire (°)</label><div class="stepper"><button class="step-btn" data-target="smokeRotationInput" data-step="-1">−</button><input id="smokeRotationInput" type="number" value="-25" step="1" /><button class="step-btn" data-target="smokeRotationInput" data-step="1">+</button></div></div>
      <div class="control"><label for="smokeRotationRightInput">Smoke Rotation Offset Right Tire (°)</label><div class="stepper"><button class="step-btn" data-target="smokeRotationRightInput" data-step="-1">−</button><input id="smokeRotationRightInput" type="number" value="-25" step="1" /><button class="step-btn" data-target="smokeRotationRightInput" data-step="1">+</button></div></div>
      <div class="control"><label for="smokeDistanceInput">Smoke Distance Emitted (short→long)</label><div class="stepper"><button class="step-btn" data-target="smokeDistanceInput" data-step="-0.2">−</button><input id="smokeDistanceInput" type="number" value="1.8" step="0.2" /><button class="step-btn" data-target="smokeDistanceInput" data-step="0.2">+</button></div></div>
      <div class="control"><label for="smokeSpreadInput">Smoke Spread</label><div class="stepper"><button class="step-btn" data-target="smokeSpreadInput" data-step="-0.1">−</button><input id="smokeSpreadInput" type="number" value="1.2" step="0.1" /><button class="step-btn" data-target="smokeSpreadInput" data-step="0.1">+</button></div></div>
      <div class="control"><label for="smokeShootSpeedInput">Smoke Shoot Speed (slow→fast)</label><div class="stepper"><button class="step-btn" data-target="smokeShootSpeedInput" data-step="-0.1">−</button><input id="smokeShootSpeedInput" type="number" value="1.0" step="0.1" /><button class="step-btn" data-target="smokeShootSpeedInput" data-step="0.1">+</button></div></div>
      <div class="control"><label for="smokeFlowInput">Smoke Flow (spirts→continuous)</label><div class="stepper"><button class="step-btn" data-target="smokeFlowInput" data-step="-0.2">−</button><input id="smokeFlowInput" type="number" value="2.4" step="0.2" /><button class="step-btn" data-target="smokeFlowInput" data-step="0.2">+</button></div></div>
      <div class="control"><label for="smokeOffsetXInput">Smoke Offset X (px, car width)</label><div class="stepper"><button class="step-btn" data-target="smokeOffsetXInput" data-step="-1">−</button><input id="smokeOffsetXInput" type="number" value="22" step="1" /><button class="step-btn" data-target="smokeOffsetXInput" data-step="1">+</button></div></div>
      <div class="control"><label for="smokeOffsetYInput">Smoke Offset Y (px, car length)</label><div class="stepper"><button class="step-btn" data-target="smokeOffsetYInput" data-step="-1">−</button><input id="smokeOffsetYInput" type="number" value="0" step="1" /><button class="step-btn" data-target="smokeOffsetYInput" data-step="1">+</button></div></div>
      <div class="control"><label for="smokeDensityInput">Smoke Density (thin→thick)</label><div class="stepper"><button class="step-btn" data-target="smokeDensityInput" data-step="-0.2">−</button><input id="smokeDensityInput" type="number" value="1.8" step="0.2" /><button class="step-btn" data-target="smokeDensityInput" data-step="0.2">+</button></div></div>
      <div class="control"><label for="smokeColorInput">Smoke Color</label><input id="smokeColorInput" type="color" value="#f0f0f0" /></div>
      <p style="margin-top:14px;">Right-tire smoke mirrors X (width) across the car centerline. Y controls front/back distance.</p>
    </aside>

    <div class="watch" id="watch">
      <div id="digitalTime">00:00</div>
      <div id="smokeLayer"></div>
    </div>
  </main>

  <script>
    const watch = document.getElementById('watch');
    const digitalTime = document.getElementById('digitalTime');
    const smokeLayer = document.getElementById('smokeLayer');

    const timeSizeInput = document.getElementById('timeSizeInput');
    const timeXInput = document.getElementById('timeXInput');
    const timeYInput = document.getElementById('timeYInput');
    const timeColorInput = document.getElementById('timeColorInput');
    const carSizeInput = document.getElementById('carSizeInput');
    const carRadiusInput = document.getElementById('carRadiusInput');
    const carRotationInput = document.getElementById('carRotationInput');
    const rotationMultiplierInput = document.getElementById('rotationMultiplierInput');
    const smokeRotationInput = document.getElementById('smokeRotationInput');
    const smokeRotationRightInput = document.getElementById('smokeRotationRightInput');
    const smokeDistanceInput = document.getElementById('smokeDistanceInput');
    const smokeSpreadInput = document.getElementById('smokeSpreadInput');
    const smokeOffsetXInput = document.getElementById('smokeOffsetXInput');
    const smokeOffsetYInput = document.getElementById('smokeOffsetYInput');
    const smokeShootSpeedInput = document.getElementById('smokeShootSpeedInput');
    const smokeFlowInput = document.getElementById('smokeFlowInput');
    const smokeDensityInput = document.getElementById('smokeDensityInput');
    const smokeColorInput = document.getElementById('smokeColorInput');

    const car = document.createElement('img');
    car.id = 'car';
    car.alt = 'Car second hand';
    const cars = ['car_images/Nissan Skyline R34 - Matte White.png', 'car_images/Porshe 911 - Glossy red.png', 'car_images/Subaru WRX STI - Metallic blue.png'];
    car.src = cars[new Date().getSeconds() % cars.length];
    watch.appendChild(car);

    const hub = document.createElement('div');
    hub.className = 'hub';
    watch.appendChild(hub);

    const smokeParticles = [];
    const SMOKE_MAX_BASE = 56;

    function setupSteppers() {
      document.querySelectorAll('.step-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.target);
          const step = Number(btn.dataset.step);
          const current = Number(input.value) || 0;
          input.value = String(current + step);
          updateControlValues();
        });
      });
    }

    function updateControlValues() {
      digitalTime.style.fontSize = `${Number(timeSizeInput.value) || 0}px`;
      digitalTime.style.left = `${Number(timeXInput.value) || 0}%`;
      digitalTime.style.top = `${Number(timeYInput.value) || 0}%`;
      digitalTime.style.color = timeColorInput.value;
      car.style.width = `${Number(carSizeInput.value) || 0}%`;
    }

    function emitSmoke(x, y, driftAngleDeg) {
      const density = Math.max(0, Number(smokeDensityInput.value) || 0);
      const smokeMax = Math.max(1, Math.round(SMOKE_MAX_BASE * Math.max(1, density)));
      if (smokeParticles.length >= smokeMax) return;
      const particle = document.createElement('div');
      particle.className = 'smoke-puff';
      const spread = Number(smokeSpreadInput.value) || 1;
      const distance = Math.max(0.1, Number(smokeDistanceInput.value) || 0.1);
      const shootSpeed = Math.max(0.1, Number(smokeShootSpeedInput.value) || 0.1);
      const baseSize = 8 + Math.random() * 8;
      const velocity = 0.7 * spread * shootSpeed;
      particle.smoke = { x, y, vx: Math.sin(driftAngleDeg * Math.PI / 180) * velocity, vy: -Math.cos(driftAngleDeg * Math.PI / 180) * velocity, life: distance, size: baseSize, density, distance };
      const { r, g, b } = hexToRgb(smokeColorInput.value);
      particle.style.background = `radial-gradient(circle at 35% 35%, rgba(${r}, ${g}, ${b}, 0.58), rgba(${r}, ${g}, ${b}, 0.22) 68%, rgba(${r}, ${g}, ${b}, 0) 100%)`;
      smokeLayer.appendChild(particle);
      smokeParticles.push(particle);
    }

    function updateSmoke() {
      for (let i = smokeParticles.length - 1; i >= 0; i--) {
        const puff = smokeParticles[i];
        puff.smoke.x += puff.smoke.vx + (Math.random() - 0.5) * 0.6;
        puff.smoke.y += puff.smoke.vy + (Math.random() - 0.5) * 0.6;
        const density = Math.max(0, puff.smoke.density || 0);
        puff.smoke.size += 0.23 + (density * 0.08);
        const distance = Math.max(0.1, puff.smoke.distance || 0.1);
        puff.smoke.life -= Math.max(0.001, (0.018 - density * 0.0035) / distance);
        if (puff.smoke.life <= 0) {
          puff.remove();
          smokeParticles.splice(i, 1);
          continue;
        }
        puff.style.left = `calc(50% + ${puff.smoke.x}px)`;
        puff.style.top = `calc(50% + ${puff.smoke.y}px)`;
        puff.style.width = `${puff.smoke.size}px`;
        puff.style.height = `${puff.smoke.size}px`;
        puff.style.opacity = String(Math.min(1, puff.smoke.life * (0.45 + (puff.smoke.density * 0.22))));
      }
    }

    function updateDigitalTime(now) { const h = String(now.getHours()).padStart(2, '0'); const m = String(now.getMinutes()).padStart(2, '0'); digitalTime.textContent = `${h}:${m}`; }

    function hexToRgb(hex) {
      const clean = (hex || '#f0f0f0').replace('#', '');
      const normalized = clean.length === 3 ? clean.split('').map((c) => c + c).join('') : clean;
      const value = Number.parseInt(normalized, 16);
      return { r: (value >> 16) & 255, g: (value >> 8) & 255, b: value & 255 };
    }

    let smokeSpawnAccumulator = 0;
    function updateCar() {
      const now = new Date();
      const seconds = now.getSeconds() + now.getMilliseconds() / 1000;
      const secAngle = seconds * 6 * (Number(rotationMultiplierInput.value) || 0);
      const theta = secAngle * Math.PI / 180;
      const radius = watch.clientWidth * (Number(carRadiusInput.value) || 0);
      const x = radius * Math.sin(theta);
      const y = -radius * Math.cos(theta);
      const carRotation = secAngle + (Number(carRotationInput.value) || 0);
      car.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) rotate(${carRotation}deg)`;

      const spinSpeed = Math.max(0.15, Math.abs(Number(rotationMultiplierInput.value) || 0));
      const flow = Math.max(0.1, Number(smokeFlowInput.value) || 0.1);
      const density = Math.max(0, Number(smokeDensityInput.value) || 0);
      smokeSpawnAccumulator += (flow * Math.max(0.4, density) * spinSpeed) / 60;
      while (smokeSpawnAccumulator >= 1) {
        const carTheta = carRotation * Math.PI / 180;
        const lateralOffsetX = Number(smokeOffsetXInput.value) || 0;
        const longitudinalOffsetY = Number(smokeOffsetYInput.value) || 0;
        const leftSmokeOriginX = x + (longitudinalOffsetY * Math.cos(carTheta)) - (lateralOffsetX * Math.sin(carTheta));
        const leftSmokeOriginY = y + (longitudinalOffsetY * Math.sin(carTheta)) + (lateralOffsetX * Math.cos(carTheta));
        const mirroredOffsetX = -lateralOffsetX;
        const rightSmokeOriginX = x + (longitudinalOffsetY * Math.cos(carTheta)) - (mirroredOffsetX * Math.sin(carTheta));
        const rightSmokeOriginY = y + (longitudinalOffsetY * Math.sin(carTheta)) + (mirroredOffsetX * Math.cos(carTheta));
        const leftSmokeAngle = carRotation + (Number(smokeRotationInput.value) || 0);
        const rightRotationOffset = Number(smokeRotationRightInput.value) || 0;
        const rightSmokeAngle = carRotation + rightRotationOffset;
        emitSmoke(leftSmokeOriginX, leftSmokeOriginY, leftSmokeAngle + ((Math.random() - 0.5) * 8));
        emitSmoke(rightSmokeOriginX, rightSmokeOriginY, rightSmokeAngle + ((Math.random() - 0.5) * 8));
        smokeSpawnAccumulator -= 1;
      }

      car.src = cars[Math.floor(seconds) % cars.length];
      updateDigitalTime(now);
      updateSmoke();
      requestAnimationFrame(updateCar);
    }

    [timeSizeInput, timeXInput, timeYInput, timeColorInput, carSizeInput, carRadiusInput, carRotationInput, rotationMultiplierInput, smokeRotationInput, smokeRotationRightInput, smokeDistanceInput, smokeSpreadInput, smokeShootSpeedInput, smokeFlowInput, smokeOffsetXInput, smokeOffsetYInput, smokeDensityInput, smokeColorInput].forEach((input) => input.addEventListener('input', updateControlValues));
    setupSteppers();
    updateControlValues();
    updateCar();
  </script>
</body>
</html>
